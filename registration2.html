<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Glassmorphism Login Form | CodingNepal</title>
    <link rel="stylesheet" href="stylelog.css" />
  </head>
  <body>
    <div class="wrapper">
      <form action="#">
        <h2>Регистрация</h2>
        <div class="input-field">
          <input type="nick" placeholder="Введите никнейм">  
          </div>
        <div class="input-field">
            <input type="email" placeholder="Введите почту:">
          </div>

        <div class="input-field">
          <input type="password1" placeholder="Придумайте пароль">
        </div>
          <div class="input-field">
            <input type="password2" placeholder="Повторно введите пароль">
          </div>

        <div class="forget">
          <label for="remember">

          
        </div>
        <button type="submit">Зарегистрироваться</button>
        <a href="first.html" class="button:back">Вернуться назад</a>
      </form>
    </div>
  </body>
</html>
